{% extends "base.html" %}
{% block title %}Staff · Wynnvets Annihilation{% endblock %}
{% block page_extra %}page-auth{% endblock %}
{% block content %}
  <h1>Staff Login</h1>
  <section class="card">
    {% if error %}<p class="bar bar-danger">{{ error }}</p>{% endif %}
    <form method="post" action="/staff/login">
      <label for="sp">Staff password</label>
      <input id="sp" name="password" type="password" autocomplete="off" required>
      <button type="submit">Log In</button>
    </form>
  </section>
{% endblock %}
